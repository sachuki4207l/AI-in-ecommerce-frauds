<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Seller Advisory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>body{padding:18px}</style>
</head>

<body>
    <div class="container">
        <header class="appbar">
            <div class="brand">
                <div class="logo">FS</div>
                <div>
                    <div class="title">Seller Advisory</div>
                    <div class="muted">Detailed risk & recommendation</div>
                </div>
            </div>

            <div class="controls">
                <a href="/" class="btn secondary">Back to sellers</a>
            </div>
        </header>

        <main>
            <div id="advisory" class="card">Loading advisory…</div>
        </main>

        <footer>
            <div class="muted">Seller ID: {{ seller_id }}</div>
        </footer>
    </div>

    <script src="/static/main.js"></script>
    <script>
        const sellerId = "{{ seller_id }}";
        window.addEventListener('DOMContentLoaded', () => {
            window.loadAdvisory(sellerId, 'advisory');
        });
    </script>
</body>

</html>
